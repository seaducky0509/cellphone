<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CELL PHONE</title>
    <meta name="description" content="手機辨識車牌" />
    <link rel="stylesheet" href="./mobile.css?v=20260608-1" />
  </head>
  <body>
    <main class="landing" id="landing-view">
      <section class="landing-hero">
        <div class="landing-badge">GitHub Pages 正式入口</div>
        <h1>CELL PHONE 車牌辨識平台</h1>
        <p>
          這個入口提供兩種模式。主機端可用手機鏡頭擷取影像並送到後端辨識；
          觀看端可同步查看辨識影像、標記結果，並控制主機端鏡頭與辨識。
        </p>
      </section>
      <section class="landing-grid">
        <article class="landing-card">
          <h2>手機主機端</h2>
          <p>適合 A 手機作為鏡頭來源，開啟鏡頭後即時送出影像給電腦後端辨識。</p>
          <button id="enter-host" type="button">進入主機端</button>
        </article>
        <article class="landing-card">
          <h2>手機觀看端</h2>
          <p>適合 B/C/D 手機觀看 A 手機辨識畫面，也可遠端控制鏡頭與辨識開關。</p>
          <button id="enter-viewer" type="button">進入觀看端</button>
        </article>
      </section>
    </main>

    <nav class="tabs app-shell hidden" aria-label="主要分頁">
      <button class="tab active" type="button" data-tab="recognition">辨識畫面</button>
      <button class="tab" type="button" data-tab="admin">名單管理</button>
    </nav>

    <main class="app view active app-shell hidden" id="recognition-view">
      <section class="camera">
        <div class="stage">
          <video id="camera" playsinline autoplay muted></video>
          <canvas id="preview"></canvas>
          <canvas id="overlay"></canvas>
        </div>
        <div class="controls">
          <button id="start" type="button">開啟鏡頭</button>
          <button id="toggle" type="button" disabled>開始辨識</button>
        </div>
        <label class="size-control">
          <span>辨識畫面大小</span>
          <input id="view-size" type="range" min="360" max="1100" step="20" value="760" />
          <output id="view-size-label">760px</output>
        </label>
      </section>

      <section class="panel">
        <div class="status">
          <span id="dot" class="dot"></span>
          <strong id="state">尚未連線</strong>
        </div>

        <label class="field">
          <span>後端網址</span>
          <input id="backend-url" type="url" placeholder="https://xxxx.trycloudflare.com" />
        </label>
        <div class="row">
          <button id="save-url" type="button">儲存網址</button>
          <button id="reload-config" type="button">重新讀取設定</button>
        </div>

        <div class="plate" id="latest-plate">--</div>
        <div class="alert" id="alert">
          <strong>未登錄車牌</strong>
          <span id="alert-plate">--</span>
        </div>
        <div class="plate-list" id="plate-list"></div>

        <dl class="metrics">
          <div>
            <dt>耗時</dt>
            <dd id="elapsed">--</dd>
          </div>
          <div>
            <dt>MQTT</dt>
            <dd id="mqtt">--</dd>
          </div>
          <div>
            <dt>訊息</dt>
            <dd id="message">請先開啟鏡頭</dd>
          </div>
        </dl>
      </section>
    </main>

    <main class="admin-view view app-shell hidden" id="admin-view">
      <section class="admin-card">
        <div class="admin-header">
          <h1>名單管理</h1>
          <div class="status small">
            <span id="admin-dot" class="dot"></span>
            <strong id="admin-state" class="status-text">請輸入密碼</strong>
          </div>
        </div>

        <label class="field">
          <span>管理密碼</span>
          <span class="password-row">
            <input id="admin-token" type="password" autocomplete="current-password" placeholder="請輸入管理密碼" />
            <button id="confirm-admin-token" type="button">確認</button>
          </span>
        </label>

        <details class="admin-section">
          <summary>變更密碼</summary>
          <form class="password-change-form" id="password-change-form">
            <label class="field">
              <span>原始密碼</span>
              <input id="old-admin-token" type="password" autocomplete="current-password" placeholder="目前密碼" />
            </label>
            <label class="field">
              <span>新密碼</span>
              <input id="new-admin-token" type="password" autocomplete="new-password" placeholder="至少 4 個字元" />
            </label>
            <label class="field">
              <span>確認新密碼</span>
              <input id="confirm-new-admin-token" type="password" autocomplete="new-password" placeholder="再次輸入新密碼" />
            </label>
            <button id="change-admin-token" type="submit">送出變更密碼</button>
          </form>
        </details>

        <details class="admin-section">
          <summary>登錄名單</summary>
          <div class="row admin-actions two">
            <button id="load-authorized" type="button">預覽名單</button>
            <button id="download-authorized" type="button">下載名單</button>
          </div>
          <div class="authorized-list" id="authorized-list"></div>
        </details>

        <details class="admin-section">
          <summary>未登錄紀錄</summary>
          <div class="row admin-actions two">
            <button id="preview-events" type="button">預覽名單</button>
            <button id="download-events" type="button">下載名單</button>
            <button id="clear-events" class="danger-button full-row" type="button">清空紀錄</button>
          </div>
          <div class="record-list" id="unauthorized-list"></div>
        </details>

        <details class="admin-section">
          <summary>新增或更新車牌</summary>
          <form class="plate-form" id="plate-form">
            <label class="field">
              <span>車牌號碼</span>
              <input id="admin-plate" type="text" inputmode="latin" placeholder="例如 ABC-1234" required />
            </label>
            <label class="field">
              <span>車主</span>
              <input id="admin-owner" type="text" placeholder="可留空" />
            </label>
            <label class="field">
              <span>備註</span>
              <input id="admin-note" type="text" placeholder="可留空" />
            </label>
            <button type="submit">送出車牌資料</button>
          </form>
        </details>

        <div class="admin-message" id="admin-message">切到此分頁後，輸入密碼即可管理名單。</div>
      </section>
    </main>

    <canvas id="capture" hidden></canvas>
    <script src="./mobile.js?v=20260608-1"></script>
  </body>
</html>
