<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CELL PHONE</title>
    <meta name="description" content="手機辨識車牌" />
    <link rel="stylesheet" href="./mobile.css?v=20260518-2" />
  </head>
  <body>
    <nav class="tabs" aria-label="主要分頁">
      <button class="tab active" type="button" data-tab="recognition">辨識畫面</button>
      <button class="tab" type="button" data-tab="admin">名單管理</button>
    </nav>

    <main class="app view active" id="recognition-view">
      <section class="camera">
        <div class="stage">
          <video id="camera" playsinline autoplay muted></video>
          <canvas id="preview"></canvas>
          <canvas id="overlay"></canvas>
        </div>
        <div class="controls">
          <button id="start" type="button">開啟鏡頭</button>
          <button id="toggle" type="button" disabled>開始辨識</button>
        </div>
        <label class="size-control">
          <span>辨識畫面大小</span>
          <input id="view-size" type="range" min="360" max="1100" step="20" value="760" />
          <output id="view-size-label">760px</output>
        </label>
      </section>

      <section class="panel">
        <div class="status">
          <span id="dot" class="dot"></span>
          <strong id="state">尚未連線</strong>
        </div>

        <label class="field">
          <span>後端網址</span>
          <input id="backend-url" type="url" placeholder="https://xxxx.trycloudflare.com" />
        </label>
        <div class="row">
          <button id="save-url" type="button">儲存網址</button>
          <button id="reload-config" type="button">重新讀取設定</button>
        </div>

        <div class="plate" id="latest-plate">--</div>
        <div class="alert" id="alert">
          <strong>未登錄車牌</strong>
          <span id="alert-plate">--</span>
        </div>
        <div class="plate-list" id="plate-list"></div>

        <dl class="metrics">
          <div>
            <dt>耗時</dt>
            <dd id="elapsed">--</dd>
          </div>
          <div>
            <dt>MQTT</dt>
            <dd id="mqtt">--</dd>
          </div>
          <div>
            <dt>訊息</dt>
            <dd id="message">請先開啟鏡頭</dd>
          </div>
        </dl>
      </section>
    </main>

    <main class="admin-view view" id="admin-view">
      <section class="admin-card">
        <div class="admin-header">
          <h1>名單管理</h1>
          <div class="status small">
            <span id="admin-dot" class="dot"></span>
            <strong id="admin-state">尚未讀取</strong>
          </div>
        </div>

        <label class="field">
          <span>管理密碼</span>
          <input id="admin-token" type="password" autocomplete="current-password" placeholder="請輸入管理密碼" />
        </label>

        <div class="row admin-actions">
          <button id="load-authorized" type="button">讀取登錄名單</button>
          <button id="download-authorized" type="button">下載登錄名單</button>
          <button id="download-events" type="button">下載未登錄紀錄</button>
        </div>

        <form class="plate-form" id="plate-form">
          <label class="field">
            <span>車牌號碼</span>
            <input id="admin-plate" type="text" inputmode="latin" placeholder="例如 ABC-1234" required />
          </label>
          <label class="field">
            <span>車主</span>
            <input id="admin-owner" type="text" placeholder="可留空" />
          </label>
          <label class="field">
            <span>備註</span>
            <input id="admin-note" type="text" placeholder="可留空" />
          </label>
          <button type="submit">新增或更新車牌</button>
        </form>

        <div class="admin-message" id="admin-message">切到此分頁後，輸入密碼即可管理名單。</div>
        <div class="authorized-list" id="authorized-list"></div>
      </section>
    </main>

    <canvas id="capture" hidden></canvas>
    <script src="./mobile.js?v=20260518-2"></script>
  </body>
</html>
